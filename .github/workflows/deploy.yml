name: Deploy MakuluWeb

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: makuluweb-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Write SSH key
        run: |
          printf '%s' "${{ secrets.VPS_SSH_KEY_B64 }}" | tr -d '\n\r ' | base64 -d > /tmp/vps_key
          chmod 600 /tmp/vps_key

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: /tmp/vps_key
          script_stop: true
          command_timeout: 40m
          request_pty: true
          script: |
            set -euo pipefail

            APP_DIR="/var/www/makuluweb"
            BACKEND_DIR="${APP_DIR}/Backend"
            FRONTEND_DIR="${APP_DIR}/Frontend"
            BRANCH="main"
            SERVICE_NAME="makuluweb-backend.service"
            NGINX_SITE_NAME="makuluweb-ip.conf"

            echo "== Deploy started: $(date -u +'%F %T UTC') =="

            git config --global --add safe.directory "$APP_DIR"

            cd "$APP_DIR"
            git fetch origin --prune
            git checkout -f "$BRANCH"
            git reset --hard "origin/$BRANCH"

            # Ensure build user can write generated files (e.g., sitemap.xml).
            chown -R makuluweb:makuluweb "$APP_DIR"
            mkdir -p "${FRONTEND_DIR}/public"
            chown -R makuluweb:makuluweb "${FRONTEND_DIR}/public"

            if [ ! -f "${BACKEND_DIR}/src/data/defaultSiteSettings.ts" ]; then
              echo "ERROR: Missing ${BACKEND_DIR}/src/data/defaultSiteSettings.ts"
              exit 1
            fi

            echo "== Build backend =="
            runuser -u makuluweb -- bash -lc "cd '${BACKEND_DIR}' && npm ci"
            runuser -u makuluweb -- bash -lc "cd '${BACKEND_DIR}' && npm run build"

            echo "== Build frontend =="
            runuser -u makuluweb -- bash -lc "cd '${FRONTEND_DIR}' && npm ci"
            runuser -u makuluweb -- bash -lc "cd '${FRONTEND_DIR}' && npm run build"

            echo "== Sync nginx site config =="
            if [ ! -f "${APP_DIR}/makuluweb-ip.conf" ]; then
              echo "ERROR: Missing ${APP_DIR}/makuluweb-ip.conf"
              exit 1
            fi
            install -m 644 "${APP_DIR}/makuluweb-ip.conf" "/etc/nginx/sites-available/${NGINX_SITE_NAME}"
            ln -sfn "/etc/nginx/sites-available/${NGINX_SITE_NAME}" "/etc/nginx/sites-enabled/${NGINX_SITE_NAME}"
            rm -f /etc/nginx/sites-enabled/default

            echo "== Restart backend service =="
            systemctl restart "$SERVICE_NAME"
            if ! systemctl is-active --quiet "$SERVICE_NAME"; then
              echo "ERROR: ${SERVICE_NAME} is not active after restart"
              systemctl --no-pager -l status "$SERVICE_NAME" | tail -n 80 || true
              journalctl -u "$SERVICE_NAME" --no-pager -n 150 || true
              exit 1
            fi

            echo "== Validate nginx config =="
            nginx -t
            systemctl reload nginx

            echo "== Smoke checks =="
            ok=0
            for i in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:5002/api/health" >/tmp/makulu-api-health.json; then
                ok=1
                break
              fi
              sleep 2
            done
            if [ "$ok" -ne 1 ]; then
              echo "ERROR: backend health check failed after retries"
              systemctl --no-pager -l status "$SERVICE_NAME" | tail -n 80 || true
              journalctl -u "$SERVICE_NAME" --no-pager -n 150 || true
              exit 1
            fi

            curl -fsS -H "Host: 72.62.246.91" "http://127.0.0.1/" >/tmp/makulu-home.html
            grep -qi "<title>DODOMA MAKULU SDA CHURCH</title>" /tmp/makulu-home.html

            upload_probe_status=$(curl -sS -H "Host: 72.62.246.91" -o /tmp/makulu-upload-probe.json -w "%{http_code}" "http://127.0.0.1/uploads/__makulu_upload_probe__.jpg")
            if [ "$upload_probe_status" != "404" ]; then
              echo "ERROR: unexpected /uploads probe status: $upload_probe_status"
              cat /tmp/makulu-upload-probe.json || true
              exit 1
            fi
            upload_probe_headers=$(curl -sSI -H "Host: 72.62.246.91" "http://127.0.0.1/uploads/__makulu_upload_probe__.jpg" | tr -d '\r')
            echo "$upload_probe_headers" >/tmp/makulu-upload-probe.headers
            if ! grep -qi "^x-makulu-uploads: backend" /tmp/makulu-upload-probe.headers; then
              echo "ERROR: /uploads is not proxied to backend."
              cat /tmp/makulu-upload-probe.headers || true
              exit 1
            fi
            if ! grep -qi '"ok":false' /tmp/makulu-upload-probe.json; then
              echo "ERROR: /uploads probe body is not API JSON fallback."
              cat /tmp/makulu-upload-probe.json || true
              exit 1
            fi

            echo "== Final statuses =="
            systemctl --no-pager -l status "$SERVICE_NAME" | tail -n 40 || true
            systemctl --no-pager -l status nginx | tail -n 20 || true

            echo "OK: deploy completed."
